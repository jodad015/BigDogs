name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Shared
        run: pnpm build:shared

      - name: Unit Tests
        run: pnpm test

      - name: Type Check
        run: pnpm typecheck

      - name: Build Web (Production)
        run: pnpm build:web
        env:
          VITE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}

      - name: Build Marketing (Production)
        run: APP_URL=https://app.bigdogs.app pnpm build:marketing

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

      - name: Upload Marketing Artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketing-dist
          path: apps/marketing/dist/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

      - name: Download Marketing Artifact
        uses: actions/download-artifact@v4
        with:
          name: marketing-dist
          path: apps/marketing/dist/

      # --- Supabase Migrations ---
      - name: Link Supabase Project
        run: supabase link --project-ref ${{ secrets.PROD_SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push Database Migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.PROD_SUPABASE_DB_PASSWORD }}

      # --- Edge Functions ---
      - name: Deploy Edge Functions
        run: supabase functions deploy --import-map supabase/functions/import_map.json
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # --- Web App (Cloudflare Pages) ---
      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Web to Cloudflare Pages
        run: wrangler pages deploy apps/web/dist/ --project-name=bigdogs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # --- Marketing Site (Cloudflare Pages) ---
      - name: Deploy Marketing to Cloudflare Pages
        run: wrangler pages deploy apps/marketing/dist/ --project-name=bigdogs-marketing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
