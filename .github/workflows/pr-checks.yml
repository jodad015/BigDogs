name: PR Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Shared
        run: pnpm build:shared

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm typecheck

      - name: Unit Tests (Shared)
        run: pnpm test

      - name: Build Web
        run: pnpm build:web

  # E2E and integration jobs will be enabled when we have real tests
  # and proper CI Supabase key management (capture from `supabase status`)
  # See: apps/web/e2e/ and supabase/functions/_shared/__tests__/
